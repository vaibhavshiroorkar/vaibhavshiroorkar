cat > .github/workflows/update-stats.yml <<'YAML'
name: Update GitHub Stats SVGs (tolerant)

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:        # manual run

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch stats with fallbacks
        run: |
          set -e
          mkdir -p assets tmp
          # urls to try (primary then fallbacks)
          STATS_URLS=(
            "https://github-readme-stats-git-master-rstaa-rickstaa.vercel.app/api?username=vaibhavshiroorkar&show_icons=true&hide_border=true&theme=tokyonight"
            "https://github-readme-stats-brown-ten.vercel.app/api?username=vaibhavshiroorkar&show_icons=true&hide_border=true&theme=tokyonight"
            "https://github-readme-stats.vercel.app/api?username=vaibhavshiroorkar&show_icons=true&hide_border=true&theme=tokyonight"
          )
          LANGS_URLS=(
            "https://github-readme-stats.vercel.app/api/top-langs/?username=vaibhavshiroorkar&layout=compact&hide_border=true&theme=tokyonight"
            "https://github-readme-stats-brown-ten.vercel.app/api/top-langs/?username=vaibhavshiroorkar&layout=compact&hide_border=true&theme=tokyonight"
          )

          echo "Trying to fetch github-stats SVG from fallbacks..."
          STATS_OK=0
          for url in "${STATS_URLS[@]}"; do
            echo "Trying: $url"
            if curl -sfL --max-time 30 "$url" -o tmp/github-stats.tmp.svg; then
              if grep -q "<svg" tmp/github-stats.tmp.svg; then
                mv tmp/github-stats.tmp.svg assets/github-stats.svg
                echo "Fetched and saved assets/github-stats.svg from: $url"
                STATS_OK=1
                break
              else
                echo "Not valid SVG from $url"
              fi
            else
              echo "Failed to download from $url"
            fi
          done

          echo "Trying to fetch github-langs SVG from fallbacks..."
          LANGS_OK=0
          for url in "${LANGS_URLS[@]}"; do
            echo "Trying: $url"
            if curl -sfL --max-time 30 "$url" -o tmp/github-langs.tmp.svg; then
              if grep -q "<svg" tmp/github-langs.tmp.svg; then
                mv tmp/github-langs.tmp.svg assets/github-langs.svg
                echo "Fetched and saved assets/github-langs.svg from: $url"
                LANGS_OK=1
                break
              else
                echo "Not valid SVG from $url"
              fi
            else
              echo "Failed to download from $url"
            fi
          done

          # clean tmp
          rm -rf tmp || true

          if [ "$STATS_OK" -eq 0 ] && [ "$LANGS_OK" -eq 0 ]; then
            echo "No new SVGs fetched from any fallback. Keeping existing cached assets."
            exit 0
          fi

      - name: Commit and push if changed
        env:
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          git config user.name "$GIT_COMMITTER_NAME"
          git config user.email "$GIT_COMMITTER_EMAIL"
          git add assets/github-stats.svg assets/github-langs.svg || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(ci): update cached GitHub stats SVGs (fallback + tolerant)"
            git push
          fi
